name: Deploy 盯盘助手

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Create worker.js from embedded content
        run: |
          echo "" | base64 -d > worker.js
          echo "worker.js size: $(wc -c < worker.js) bytes"

      - name: Deploy via Cloudflare API
        run: |
          HTTP_CODE=$(curl -s -o /tmp/cf_resp.json -w "%{http_code}" -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/workers/scripts/dingpan-assistant" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -F 'metadata={"main_module":"worker.js","compatibility_date":"2026-03-16"};type=application/json' \
            -F 'worker.js=@worker.js;type=application/javascript+module')
          echo "HTTP: $HTTP_CODE"
          cat /tmp/cf_resp.json
          if [ "$HTTP_CODE" != "200" ]; then exit 1; fi

      - name: Enable workers.dev
        run: |
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/workers/scripts/dingpan-assistant/subdomain" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"enabled": true}'
          echo "✅ Done! Visit: https://dingpan-assistant.${{ secrets.CF_ACCOUNT_ID }}.workers.dev"
