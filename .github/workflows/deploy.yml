name: Deploy 盯盘助手

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify worker.js exists
        run: |
          ls -la worker.js
          echo "Size: $(wc -c < worker.js) bytes"

      - name: Deploy to Cloudflare Workers
        run: |
          HTTP=$(curl -s -o /tmp/resp.json -w "%{http_code}" -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/workers/scripts/dingpan-assistant" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -F 'metadata={"main_module":"worker.js","compatibility_date":"2026-03-17","bindings":[{"type":"kv_namespace","name":"USERS","namespace_id":"3f4aa4dcb6b84c0ebdf77d4a9ea91d6a"},{"type":"kv_namespace","name":"HOLDINGS","namespace_id":"218ff09f279146af9bedc8a55a2043d0"}]};type=application/json' \
            -F 'worker.js=@worker.js;type=application/javascript+module')
          echo "HTTP: $HTTP"
          cat /tmp/resp.json
          [ "$HTTP" = "200" ] || exit 1
          echo "✅ 部署成功！"
