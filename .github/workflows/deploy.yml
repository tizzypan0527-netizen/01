name: Deploy 盯盘助手

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via Cloudflare API
        run: |
          curl -s -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/workers/scripts/dingpan-assistant" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -F 'metadata={"main_module":"worker.js","compatibility_date":"2026-03-16"};type=application/json' \
            -F 'worker.js=@worker.js;type=application/javascript+module' \
            | tee /tmp/cf_response.json

          SUCCESS=$(python3 -c "import json; d=json.load(open('/tmp/cf_response.json')); print(d.get('success',False))")
          echo "Deploy result: $SUCCESS"
          if [ "$SUCCESS" != "True" ]; then
            echo "ERROR:" && cat /tmp/cf_response.json && exit 1
          fi

      - name: Enable workers.dev subdomain
        run: |
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/workers/scripts/dingpan-assistant/subdomain" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"enabled": true}'

      - name: Done
        run: echo "✅ 访问地址：https://dingpan-assistant.${{ secrets.CF_ACCOUNT_ID }}.workers.dev"
