<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>盯盘助手</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0c0f;
    --bg2:      #0f1318;
    --bg3:      #151b22;
    --bg4:      #1c2530;
    --border:   #1e2d3d;
    --border2:  #253444;
    --text:     #c8d8e8;
    --text2:    #7a9ab8;
    --text3:    #4a6a88;
    --up:       #e84040;
    --up-bg:    #2a0a0a;
    --up-dim:   #ff6060;
    --dn:       #00c878;
    --dn-bg:    #0a1e14;
    --dn-dim:   #00a060;
    --gold:     #f0a030;
    --gold-bg:  #1e1400;
    --blue:     #3090f0;
    --blue-bg:  #0a1828;
    --mono:     'IBM Plex Mono', monospace;
    --sans:     'Noto Sans SC', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 2px;
  }
  .logo span { color: var(--text3); font-weight: 300; }
  .header-right { display: flex; align-items: center; gap: 16px; }
  #clock {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text2);
    letter-spacing: 1px;
  }
  #market-status {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 2px;
    font-family: var(--mono);
    letter-spacing: 1px;
  }
  .status-open  { background: var(--dn-bg);   color: var(--dn);   border: 1px solid var(--dn-dim); }
  .status-close { background: var(--up-bg);   color: var(--text3); border: 1px solid var(--border); }
  .status-pre   { background: var(--gold-bg); color: var(--gold);  border: 1px solid var(--gold); }

  /* LAYOUT */
  .layout { display: grid; grid-template-columns: 260px 1fr; height: calc(100vh - 48px); }

  /* SIDEBAR */
  aside {
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-section {
    border-bottom: 1px solid var(--border);
    padding: 12px 14px;
  }
  .sidebar-title {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .fund-list { display: flex; flex-direction: column; gap: 2px; overflow-y: auto; flex: 1; padding: 8px 8px; }
  .fund-item {
    padding: 7px 8px;
    border-radius: 3px;
    border: 1px solid transparent;
    transition: all 0.15s;
  }
  .fund-item-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
  }
  .fund-item:hover  { background: var(--bg3); border-color: var(--border); }
  .fund-item.editing { background: var(--bg4); border-color: var(--blue); }
  .fund-item-left { flex: 1; min-width: 0; }
  .fund-item-code { font-family: var(--mono); font-size: 11px; color: var(--text3); }
  .fund-item-name { font-size: 12px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 110px; }
  .fund-item-right { text-align: right; display: flex; align-items: center; gap: 6px; }
  .fund-item-nums { text-align: right; }
  .fund-pct { font-family: var(--mono); font-size: 12px; font-weight: 500; }
  .fund-val { font-family: var(--mono); font-size: 10px; color: var(--text3); }
  .fund-actions { display: none; gap: 3px; }
  .fund-item:hover .fund-actions { display: flex; }
  .fund-action-btn {
    width: 20px; height: 20px;
    border-radius: 2px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text3);
    cursor: pointer;
    font-size: 11px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.12s;
    flex-shrink: 0;
  }
  .fund-action-btn:hover.edit-btn  { color: var(--blue);   border-color: var(--blue);   background: var(--blue-bg); }
  .fund-action-btn:hover.del-btn   { color: var(--up);     border-color: var(--up);     background: var(--up-bg); }

  /* INLINE EDIT FORM */
  .inline-edit {
    display: none;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px dashed var(--border2);
    flex-direction: column;
    gap: 5px;
  }
  .fund-item.editing .inline-edit { display: flex; }
  .ie-row { display: flex; gap: 5px; align-items: center; }
  .ie-label { font-size: 10px; color: var(--text3); font-family: var(--mono); width: 36px; flex-shrink: 0; }
  .ie-input {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 4px 7px;
    border-radius: 2px;
    outline: none;
    min-width: 0;
  }
  .ie-input:focus { border-color: var(--blue); }
  .ie-btns { display: flex; gap: 4px; margin-top: 2px; }
  .ie-save { flex:1; padding:4px 0; background:var(--blue-bg); color:var(--blue); border:1px solid var(--blue); border-radius:2px; font-family:var(--mono); font-size:10px; cursor:pointer; transition:all 0.12s; }
  .ie-save:hover { background:var(--blue); color:#fff; }
  .ie-cancel { flex:1; padding:4px 0; background:transparent; color:var(--text3); border:1px solid var(--border); border-radius:2px; font-family:var(--mono); font-size:10px; cursor:pointer; transition:all 0.12s; }
  .ie-cancel:hover { background:var(--bg3); }
  .up-color { color: var(--up); }
  .dn-color { color: var(--dn); }
  .na-color { color: var(--text3); }

  /* ADD FUND FORM */
  .add-form { padding: 10px 14px; border-top: 1px solid var(--border); }
  .add-form input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 2px;
    outline: none;
    margin-bottom: 6px;
    transition: border-color 0.15s;
  }
  .add-form input:focus { border-color: var(--blue); }
  .add-form input::placeholder { color: var(--text3); }
  .btn-row { display: flex; gap: 6px; }
  .btn {
    flex: 1;
    padding: 6px 0;
    border-radius: 2px;
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    border: 1px solid;
    letter-spacing: 0.5px;
    transition: all 0.15s;
  }
  .btn-primary { background: var(--blue-bg); color: var(--blue); border-color: var(--blue); }
  .btn-primary:hover { background: var(--blue); color: #fff; }
  .btn-danger  { background: var(--up-bg); color: var(--up); border-color: var(--up); }
  .btn-danger:hover { background: var(--up); color: #fff; }
  .btn-ghost   { background: transparent; color: var(--text2); border-color: var(--border); }
  .btn-ghost:hover { background: var(--bg3); }

  /* MAIN */
  main { display: flex; flex-direction: column; overflow: hidden; }

  /* SUMMARY BAR */
  .summary-bar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    gap: 24px;
    align-items: center;
    flex-wrap: wrap;
  }
  .summary-item { display: flex; flex-direction: column; gap: 2px; }
  .summary-label { font-size: 10px; color: var(--text3); font-family: var(--mono); letter-spacing: 1px; text-transform: uppercase; }
  .summary-value { font-family: var(--mono); font-size: 16px; font-weight: 500; }
  .summary-divider { width: 1px; height: 32px; background: var(--border); }

  /* TABS */
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    padding: 0 20px;
  }
  .tab {
    padding: 10px 16px;
    font-size: 12px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    color: var(--text3);
    font-family: var(--mono);
    letter-spacing: 0.5px;
    transition: all 0.15s;
  }
  .tab:hover  { color: var(--text2); }
  .tab.active { color: var(--gold); border-bottom-color: var(--gold); }

  /* CONTENT */
  .content { flex: 1; overflow-y: auto; padding: 16px 20px; }

  /* GRID CARDS */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 12px;
    margin-bottom: 16px;
  }
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .card:hover { border-color: var(--border2); }
  .card-header {
    padding: 10px 14px 8px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    border-bottom: 1px solid var(--border);
  }
  .card-code { font-family: var(--mono); font-size: 10px; color: var(--text3); }
  .card-name { font-size: 13px; font-weight: 500; color: var(--text); margin-top: 1px; }
  .tag {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 2px;
    font-family: var(--mono);
    white-space: nowrap;
  }
  .tag-up   { background: var(--up-bg);   color: var(--up);   border: 1px solid var(--up-bg); }
  .tag-dn   { background: var(--dn-bg);   color: var(--dn);   border: 1px solid var(--dn-bg); }
  .tag-gold { background: var(--gold-bg); color: var(--gold); border: 1px solid var(--gold-bg); }
  .tag-blue { background: var(--blue-bg); color: var(--blue); border: 1px solid var(--blue-bg); }
  .tag-dim  { background: var(--bg3);     color: var(--text3); border: 1px solid var(--border); }

  .card-body { padding: 10px 14px; }
  .val-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 4px;
  }
  .val-label { font-size: 11px; color: var(--text3); font-family: var(--mono); }
  .val-num   { font-family: var(--mono); font-size: 14px; font-weight: 500; color: var(--text); }
  .val-num-lg { font-family: var(--mono); font-size: 20px; font-weight: 600; }

  .divider-dashed {
    border: none;
    border-top: 1px dashed var(--border2);
    margin: 8px 0;
  }
  .est-label {
    font-size: 10px;
    color: var(--text3);
    font-family: var(--mono);
    letter-spacing: 1px;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .est-badge {
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 2px;
    background: var(--gold-bg);
    color: var(--gold);
    border: 1px solid #3a2800;
  }

  .progress-bar { height: 3px; background: var(--bg3); border-radius: 2px; margin-top: 10px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; }

  .card-footer {
    padding: 8px 14px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .suggestion-pill {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 2px;
    font-family: var(--mono);
    font-weight: 500;
  }
  .s-sell   { background: var(--up-bg);   color: var(--up);   border: 1px solid #400; }
  .s-watch  { background: #1a1000;        color: #c08000;     border: 1px solid #3a2000; }
  .s-try    { background: #0a1a0a;        color: #60c060;     border: 1px solid #1a3a1a; }
  .s-buy    { background: var(--dn-bg);   color: var(--dn);   border: 1px solid #004020; }
  .s-hold   { background: var(--bg3);     color: var(--text3); border: 1px solid var(--border); }
  .card-action-btn {
    font-size: 10px;
    color: var(--text3);
    cursor: pointer;
    font-family: var(--mono);
    letter-spacing: 0.5px;
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 2px;
    background: transparent;
    transition: all 0.15s;
  }
  .card-action-btn:hover { color: var(--blue); border-color: var(--blue); }

  /* NEWS PANEL */
  .news-list { display: flex; flex-direction: column; gap: 8px; }
  .news-item {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--border2);
    padding: 10px 14px;
    border-radius: 0 4px 4px 0;
    transition: border-color 0.15s;
  }
  .news-item:hover { border-left-color: var(--gold); }
  .news-sector { font-size: 10px; color: var(--gold); font-family: var(--mono); margin-bottom: 4px; }
  .news-text   { font-size: 13px; color: var(--text); line-height: 1.5; }
  .news-meta   { font-size: 10px; color: var(--text3); margin-top: 4px; font-family: var(--mono); }

  /* SUGGESTION PANEL */
  .suggestion-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .suggestion-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .suggestion-name { font-size: 14px; font-weight: 500; }
  .suggestion-body { font-size: 12px; color: var(--text2); line-height: 1.7; }
  .suggestion-ops  { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
  .op-row { display: flex; gap: 8px; align-items: flex-start; }
  .op-day { font-size: 10px; color: var(--text3); font-family: var(--mono); width: 36px; flex-shrink: 0; padding-top: 2px; }
  .op-text { font-size: 12px; color: var(--text); }

  /* SETTINGS */
  .settings-section { margin-bottom: 20px; }
  .settings-title { font-family: var(--mono); font-size: 11px; color: var(--text3); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
  .settings-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px dashed var(--border); }
  .settings-label { font-size: 13px; color: var(--text2); }
  .settings-value { font-family: var(--mono); font-size: 12px; color: var(--text); }
  .toggle {
    width: 36px; height: 20px;
    background: var(--bg4);
    border-radius: 10px;
    border: 1px solid var(--border);
    cursor: pointer;
    position: relative;
    transition: background 0.2s;
  }
  .toggle.on { background: var(--dn); border-color: var(--dn); }
  .toggle::after {
    content: '';
    position: absolute;
    width: 14px; height: 14px;
    background: var(--text3);
    border-radius: 50%;
    top: 2px; left: 2px;
    transition: all 0.2s;
  }
  .toggle.on::after { background: #fff; left: 18px; }

  /* ALERT */
  .alert {
    padding: 10px 14px;
    border-radius: 3px;
    font-size: 12px;
    margin-bottom: 10px;
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }
  .alert-warn { background: var(--gold-bg); border: 1px solid #3a2800; color: #c08030; }
  .alert-info { background: var(--blue-bg); border: 1px solid #0a3060; color: var(--blue); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text3); }

  /* MODAL */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-backdrop.show { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 20px;
    width: 380px;
    max-width: 90vw;
    transform: translateY(10px);
    transition: transform 0.2s;
  }
  .modal-backdrop.show .modal { transform: translateY(0); }
  .modal-title { font-family: var(--mono); font-size: 13px; color: var(--gold); margin-bottom: 14px; letter-spacing: 1px; }
  .form-group { margin-bottom: 12px; }
  .form-label { font-size: 11px; color: var(--text3); font-family: var(--mono); margin-bottom: 4px; display: block; }
  .form-input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 8px 10px;
    border-radius: 3px;
    outline: none;
  }
  .form-input:focus { border-color: var(--blue); }
  .modal-actions { display: flex; gap: 8px; margin-top: 16px; }

  /* LOADING */
  .loading-dots::after {
    content: '...';
    animation: dots 1.2s steps(4, end) infinite;
  }
  @keyframes dots {
    0%, 20% { content: '.'; }
    40% { content: '..'; }
    60%, 100% { content: '...'; }
  }
  .spin {
    display: inline-block;
    width: 12px; height: 12px;
    border: 2px solid var(--border);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* FADE IN */
  .fade-in { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  /* RESPONSIVE */
  @media (max-width: 700px) {
    .layout { grid-template-columns: 1fr; }
    aside { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">盯盘助手 <span>/ MONITOR</span></div>
  <div class="header-right">
    <div id="clock">--:--:--</div>
    <div id="market-status" class="status-close">休市</div>
    <button class="btn btn-ghost" style="padding:5px 12px;font-size:11px;" onclick="refreshAll()">
          <span id="refresh-icon">↻</span> 刷新估值
        </button>
  </div>
</header>

<div class="layout">
  <!-- SIDEBAR -->
  <aside>
    <div class="sidebar-section" style="padding:10px 12px;">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div class="sidebar-title" style="margin-bottom:0">持仓列表 <span id="holding-count" style="color:var(--text3);font-size:9px"></span></div>
        <button class="btn btn-primary" style="padding:3px 10px;font-size:10px;flex:none;" onclick="openAddModal()">+ 添加</button>
      </div>
    </div>
    <div class="fund-list" id="fund-list"></div>
    <div class="add-form">
      <input type="text" id="quick-code" placeholder="快速添加：输入基金代码 Enter" maxlength="10" style="margin-bottom:0">
    </div>
  </aside>

  <!-- MAIN -->
  <main>
    <!-- SUMMARY BAR -->
    <div class="summary-bar" id="summary-bar">
      <div class="summary-item">
        <div class="summary-label">总持仓市值</div>
        <div class="summary-value" id="sum-total">--</div>
      </div>
      <div class="summary-divider"></div>
      <div class="summary-item">
        <div class="summary-label">今日估算盈亏</div>
        <div class="summary-value" id="sum-today">--</div>
      </div>
      <div class="summary-divider"></div>
      <div class="summary-item">
        <div class="summary-label">总浮盈亏</div>
        <div class="summary-value" id="sum-pnl">--</div>
      </div>
      <div class="summary-divider"></div>
      <div class="summary-item">
        <div class="summary-label">持仓只数</div>
        <div class="summary-value" id="sum-count">0</div>
      </div>
      <div style="margin-left:auto;"></div>
    </div>

    <!-- TABS -->
    <div class="tabs">
      <div class="tab active" onclick="switchTab('overview')" id="tab-overview">总览</div>
      <div class="tab" onclick="switchTab('valuation')" id="tab-valuation">实时估值</div>
      <div class="tab" onclick="switchTab('news')" id="tab-news">新闻播报</div>
      <div class="tab" onclick="switchTab('suggestion')" id="tab-suggestion">买卖建议</div>
      <div class="tab" onclick="switchTab('settings')" id="tab-settings">设置</div>
    </div>

    <!-- CONTENT -->
    <div class="content" id="content">
      <div id="tab-content-overview" class="tab-content"></div>
      <div id="tab-content-valuation" class="tab-content" style="display:none"></div>
      <div id="tab-content-news" class="tab-content" style="display:none"></div>
      <div id="tab-content-suggestion" class="tab-content" style="display:none"></div>
      <div id="tab-content-settings" class="tab-content" style="display:none"></div>
    </div>
  </main>
</div>

<!-- ADD MODAL -->
<div class="modal-backdrop" id="modal-backdrop" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-title">添加持仓</div>
    <div class="form-group">

// ─── INIT ────────────────────────────────────────────────
function load() {

    holdings = saved ? JSON.parse(saved) : [...DEFAULT_FUNDS];
  } catch(e) { holdings = [...DEFAULT_FUNDS]; }

  localStorage.setItem(STORAGE_KEY, JSON.stringify(holdings));
}

// ─── CLOCK ───────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent = `${h}:${m}:${s}`;

  const totalMin = now.getHours() * 60 + now.getMinutes();
  const el = document.getElementById('market-status');
  if (totalMin >= 9*60+30 && totalMin < 11*60+30) {
    el.className = 'status-open'; el.textContent = '交易中';
  } else if (totalMin >= 13*60 && totalMin < 15*60) {
    el.className = 'status-open'; el.textContent = '交易中';
  } else if (totalMin >= 9*60 && totalMin < 9*60+30) {
    el.className = 'status-pre'; el.textContent = '集合竞价';
  } else {
    el.className = 'status-close'; el.textContent = '已收盘';
  }
}
setInterval(updateClock, 1000);
updateClock();

// ─── HELPERS ─────────────────────────────────────────────
function fmt(n, dec=2) {
  if (n == null || isNaN(n)) return '--';
  return n.toFixed(dec);
}
function fmtMoney(n) {
  if (n == null || isNaN(n)) return '--';
  return '¥' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}
function pctClass(v) {
  if (v == null) return 'na-color';
  return v > 0 ? 'up-color' : v < 0 ? 'dn-color' : 'na-color';
}
function pctSign(v) {
  if (v == null || isNaN(v)) return '--';
  return (v > 0 ? '+' : '') + v.toFixed(2) + '%';
}
function getEst(code) { return EST_DATA[code] || {}; }
function getSignal(code) { return SIGNALS[code] || { label:'⚫ 持仓观察', cls:'s-hold', reason:'数据更新中' }; }

function calcTodayPnl(h) {
  const est = getEst(h.code);
  if (est.gszzl == null) return null;
  return h.value * est.gszzl / 100;
}
function calcTotalPnl(h) {
  if (!h.cost || !h.value) return null;
  return h.value - h.cost;
}

// ─── SUMMARY BAR ─────────────────────────────────────────
function updateSummary() {
  let total = 0, todayPnl = 0, totalPnl = 0, hasCost = false;
  holdings.forEach(h => {
    total += h.value || 0;
    const t = calcTodayPnl(h);
    if (t != null) todayPnl += t;
    const p = calcTotalPnl(h);
    if (p != null) { totalPnl += p; hasCost = true; }
  });

  document.getElementById('sum-total').textContent = fmtMoney(total);
  document.getElementById('sum-count').textContent = holdings.length;

  const todayEl = document.getElementById('sum-today');
  todayEl.textContent = (todayPnl >= 0 ? '+' : '') + fmtMoney(todayPnl).replace('¥','') + '元';
  todayEl.className = 'summary-value ' + (todayPnl >= 0 ? 'up-color' : 'dn-color');

  if (hasCost) {
    const pnlEl = document.getElementById('sum-pnl');
    pnlEl.textContent = (totalPnl >= 0 ? '+' : '') + fmtMoney(totalPnl).replace('¥','') + '元';
    pnlEl.className = 'summary-value ' + (totalPnl >= 0 ? 'up-color' : 'dn-color');
  }
}

function toggleEdit(i, e) {
  e.stopPropagation();
  if (editingIndex === i) { cancelEdit(); return; }
  editingIndex = i;
  renderSidebar();
  // focus first input
  setTimeout(() => {
    const el = document.getElementById(`ie-name-${i}`);
    if (el) el.focus();
  }, 50);
}

function saveEdit(i) {
  const name   = document.getElementById(`ie-name-${i}`)?.value.trim();
  const sector = document.getElementById(`ie-sector-${i}`)?.value.trim();
  const value  = parseFloat(document.getElementById(`ie-value-${i}`)?.value);
  const cost   = parseFloat(document.getElementById(`ie-cost-${i}`)?.value);
  const nav    = parseFloat(document.getElementById(`ie-nav-${i}`)?.value);

  if (name)              holdings[i].name   = name;
  if (sector !== undefined) holdings[i].sector = sector;
  if (!isNaN(value) && value > 0)   holdings[i].value  = value;
  if (!isNaN(cost)  && cost > 0)    holdings[i].cost   = cost;
  else if (document.getElementById(`ie-cost-${i}`)?.value === '') holdings[i].cost = null;
  if (!isNaN(nav)   && nav > 0)     holdings[i].nav    = nav;
  else if (document.getElementById(`ie-nav-${i}`)?.value === '')  holdings[i].nav  = null;

  editingIndex = -1;
  save();
  renderAll();
  showToast(`已保存 ${holdings[i].name}`);
}

function cancelEdit() {
  editingIndex = -1;
  renderSidebar();
}

function focusFund(i) {

// ─── CARD ─────────────────────────────────────────────────

  const est = getEst(h.code);

  const trendColor = (est.gszzl||0) >= 0 ? '#e84040' : '#00c878';

  return `<div class="card fund-card fade-in">
    <div class="card-header">
      <div>
        <div class="card-code">${h.code} · ${h.sector||''}</div>
        <div class="card-name">${h.name}</div>

    <div class="card-body">

        <span class="val-label">持仓市值</span>
        <span class="val-num">${fmtMoney(h.value)}</span>
      </div>
      ${h.cost ? `<div class="val-row">
        <span class="val-label">浮盈亏</span>
        <span class="val-num ${totalPnl>=0?'up-color':'dn-color'}">${totalPnl>=0?'+':''}${fmtMoney(totalPnl).replace('¥','')} (${pctSign((totalPnl/h.cost)*100)})</span>

        <span class="val-label">昨日净值</span>
        <span class="val-num" style="color:var(--text2)">${fmt(h.nav)}</span>
      </div>` : ''}

      <hr class="divider-dashed">
      <div class="est-label">
        今日实时估值
        <span class="est-badge">精度~${est.acc||'?'}%</span>
        ${h.sector==='QDII'?'<span class="est-badge" style="background:var(--up-bg);color:var(--up)">时差注意</span>':''}
      </div>
      <div class="val-row">
        <span class="val-label">估算净值</span>
        <span class="val-num-lg ${pctClass(est.gszzl)}">${estNavStr}</span>
      </div>
      <div class="val-row">
        <span class="val-label">今日预计</span>

      <button class="card-action-btn" onclick="switchTab('suggestion')">操作建议 →</button>

}

function switchTab(name) {
  currentTab = name;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

  document.getElementById('tab-' + name).classList.add('active');
  document.getElementById('tab-content-' + name).style.display = 'block';
  renderTab(name);
}

function renderTab(name) {
  const el = document.getElementById('tab-content-' + name);
  if (name === 'overview')    renderOverview(el);
  if (name === 'valuation')   renderValuation(el);
  if (name === 'news')        renderNews(el);
  if (name === 'suggestion')  renderSuggestion(el);

}

    <div class="settings-section">
      <div class="settings-title">持仓管理</div>
      ${holdings.map((h,i) => `

          <div>

            <div style="font-family:var(--mono);font-size:11px;color:var(--text3)">${h.code} · ${h.sector||'未分类'}</div>
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <div style="text-align:right">
              <div class="settings-value">${fmtMoney(h.value)}</div>

// ─── REFRESH ──────────────────────────────────────────────
function refreshAll() {
  if (refreshing) return;
  refreshing = true;
  const icon = document.getElementById('refresh-icon');
  icon.innerHTML = '<span class="spin"></span>';
  setTimeout(() => {
    refreshing = false;
    icon.textContent = '↻';
    renderSidebar();
    updateSummary();
    renderTab(currentTab);
    showToast('估值数据已刷新');
  }, 1800);
}

function showToast(msg) {
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = `position:fixed;bottom:20px;right:20px;background:var(--bg4);border:1px solid var(--border2);
    color:var(--text);padding:8px 16px;border-radius:4px;font-family:var(--mono);font-size:12px;
    z-index:500;animation:fadeIn 0.2s ease`;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// ─── FUND CRUD ────────────────────────────────────────────
function openAddModal() {
  document.getElementById('modal-backdrop').classList.add('show');
  document.getElementById('m-code').focus();
}
function closeModal() {
  document.getElementById('modal-backdrop').classList.remove('show');
  ['m-code','m-name','m-value','m-cost','m-sector'].forEach(id => document.getElementById(id).value = '');
}
function closeModalOutside(e) {
  if (e.target.id === 'modal-backdrop') closeModal();
}

function addFund() {
  const code = document.getElementById('m-code').value.trim();
  if (!code) { alert('请输入基金代码'); return; }
  const existing = holdings.find(h => h.code === code);
  if (existing) { alert('该代码已在持仓中'); return; }
  holdings.push({
    code,
    name:   document.getElementById('m-name').value.trim() || code,
    value:  parseFloat(document.getElementById('m-value').value) || 0,
    cost:   parseFloat(document.getElementById('m-cost').value) || null,
    sector: document.getElementById('m-sector').value.trim() || '其他',
    nav:    null
  });
  save(); closeModal(); renderAll(); showToast(`已添加 ${code}`);
}

function quickAdd() {
  const code = document.getElementById('quick-code').value.trim();
  if (!code) return;
  if (holdings.find(h => h.code === code)) { showToast('该代码已存在'); return; }
  holdings.push({ code, name: code, value: 0, cost: null, sector: '待分类', nav: null });
  document.getElementById('quick-code').value = '';
  save(); renderAll(); showToast(`已添加 ${code}`);
}

function removeFund(i, e) {
  if (e) e.stopPropagation();
  const removed = holdings[i];
  holdings.splice(i, 1);
  if (editingIndex === i) editingIndex = -1;
  else if (editingIndex > i) editingIndex--;
  save(); renderAll();
  // undo toast
  const t = document.createElement('div');
  t.innerHTML = `已删除 <b>${removed.name}</b> &nbsp;<span style="color:var(--blue);cursor:pointer;text-decoration:underline" onclick="undoRemove(this)">撤销</span>`;
  t.dataset.removed = JSON.stringify(removed);
  t.dataset.idx = i;
  t.style.cssText = `position:fixed;bottom:20px;right:20px;background:var(--bg4);border:1px solid var(--border2);
    color:var(--text);padding:9px 16px;border-radius:4px;font-family:var(--mono);font-size:12px;z-index:500;
    animation:fadeIn 0.2s ease;display:flex;align-items:center;gap:8px;`;
  document.body.appendChild(t);
  const tid = setTimeout(() => t.remove(), 4000);
  t.querySelector('span').addEventListener('click', () => { clearTimeout(tid); });
}

function undoRemove(el) {
  const t = el.closest('[data-removed]');
  if (!t) return;
  const removed = JSON.parse(t.dataset.removed);
  const idx = parseInt(t.dataset.idx);
  holdings.splice(Math.min(idx, holdings.length), 0, removed);
  save(); renderAll(); t.remove();
  showToast(`已恢复 ${removed.name}`);
}
function clearAll() {
  if (!confirm('确认清空所有持仓？')) return;
  holdings = []; save(); renderAll();
}
function resetDefault() {
  if (!confirm('恢复默认持仓（你的6只基金）？')) return;
  holdings = [...DEFAULT_FUNDS]; save(); renderAll();
}

// ─── RENDER ALL ───────────────────────────────────────────
function renderAll() {
  renderSidebar();
  updateSummary();
  renderTab(currentTab);
}

// ─── KEYBOARD ─────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'r' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') refreshAll();
});
document.getElementById('quick-code').addEventListener('keydown', e => {
  if (e.key === 'Enter') { quickAdd(); }
});
document.getElementById('m-code').addEventListener('keydown', e => { if (e.key==='Enter') addFund(); });

// ─── BOOT ─────────────────────────────────────────────────
load();
renderAll();
</script>
